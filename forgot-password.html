<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — DPT</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <link rel="stylesheet" href="css/theme.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <style>
    :root { --navy:#0f1f3d; --blue:#2563eb; --border:#e2e8f0; --muted:#64748b; }
    body { font-family:'Plus Jakarta Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f8fafc; padding:20px; }
    .card { background:#fff; border-radius:20px; padding:48px; width:100%; max-width:420px; box-shadow:0 8px 40px rgba(0,0,0,.08); border:1px solid var(--border); }
    .logo { font-size:24px; font-weight:700; color:var(--navy); margin-bottom:32px; text-align:center; }
    .icon { font-size:48px; text-align:center; margin-bottom:16px; }
    h1 { font-size:22px; font-weight:700; color:var(--navy); text-align:center; margin-bottom:8px; }
    .sub { font-size:13px; color:var(--muted); text-align:center; line-height:1.6; margin-bottom:28px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-size:13px; font-weight:600; color:#374151; margin-bottom:6px; }
    .form-group input { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; color:#1e293b; background:#fff; outline:none; transition:border .2s; }
    .form-group input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.08); }
    .submit-btn { width:100%; padding:13px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--blue),#1d4ed8); color:#fff; font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .2s; box-shadow:0 4px 14px rgba(37,99,235,.3); }
    .submit-btn:hover { transform:translateY(-1px); }
    .submit-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .alert { padding:12px 16px; border-radius:10px; font-size:13px; margin-bottom:18px; display:none; }
    .alert.error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; display:block; }
    .alert.success { background:#dcfce7; color:#14532d; border:1px solid #bbf7d0; display:block; }
    .back { display:block; text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
    .back a { color:var(--blue); text-decoration:none; font-weight:600; }
    .update-mode { display:none; } .update-mode.show { display:block; }
    .reset-mode.hide { display:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">DPT</div>
    <div class="alert" id="alert"></div>
    <div id="reset-mode">
      <div class="icon">🔑</div><h1>Reset your password</h1><p class="sub">Enter your email and we'll send you a reset link. Check your spam folder if it doesn't arrive.</p>
      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="you@business.co.ke" required autocomplete="email"/></div>
        <button type="submit" class="submit-btn" id="reset-btn">Send Reset Link</button>
      </form>
    </div>
    <div class="update-mode" id="update-mode">
      <div class="icon">🔒</div><h1>Set new password</h1><p class="sub">Enter your new password below.</p>
      <form id="update-form" onsubmit="handleUpdate(event)">
        <div class="form-group"><label>New Password</label><input type="password" id="new-pass" placeholder="••••••••" required minlength="8" autocomplete="new-password"/></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="new-pass2" placeholder="••••••••" required autocomplete="new-password"/></div>
        <button type="submit" class="submit-btn" id="update-btn">Update Password</button>
      </form>
    </div>
    <div class="back">← <a href="index.html">Back to Login</a></div>
  </div>

  <script src="js/theme.js"></script>
  <script>
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('reset-mode').classList.add('hide');
        document.getElementById('update-mode').classList.add('show');
      }
      if (event === 'SIGNED_IN' && session && !window.location.hash.includes('type=recovery')) {
        window.location.href = DASHBOARD_URL;
      }
    });

    async function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('reset-btn');
      btn.disabled = true; btn.textContent = 'Sending...'; hideAlert();
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/forgot-password.html' });
      showAlert('If an account exists with this email, a reset link has been sent. Check your spam folder too.', 'success');
      btn.disabled = false; btn.textContent = 'Send Reset Link';
      document.getElementById('reset-form').reset();
    }

    async function handleUpdate(e) {
      e.preventDefault();
      const pass = document.getElementById('new-pass').value;
      const pass2 = document.getElementById('new-pass2').value;
      const btn = document.getElementById('update-btn');
      if (pass !== pass2) { showAlert('Passwords do not match.', 'error'); return; }
      btn.disabled = true; btn.textContent = 'Updating...'; hideAlert();
      const { error } = await sb.auth.updateUser({ password: pass });
      if (error) { showAlert('Error: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Update Password'; return; }
      showAlert('Password updated successfully! Redirecting to login...', 'success');
      setTimeout(() => { window.location.href = LOGIN_URL; }, 2000);
    }

    function showAlert(msg, type) { const el = document.getElementById('alert'); el.textContent = msg; el.className = `alert ${type}`; }
    function hideAlert() { document.getElementById('alert').className = 'alert'; }
  </script>
</body>
</html>
